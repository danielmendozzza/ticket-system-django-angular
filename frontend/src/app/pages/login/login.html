<div class="login-shell">
  <section class="login-panel">
    <div class="login-card">
      <p class="login-eyebrow">Acceso operativo</p>
      <h2>Iniciar sesión</h2>
      <p>Ingresa con tu usuario asignado para acceder al panel correspondiente.</p>

      <form class="login-form" (ngSubmit)="login()">
        <label>
          Usuario
          <input [(ngModel)]="username" name="username" placeholder="Usuario" required>
        </label>

        <label>
          Contraseña
          <input [(ngModel)]="password" name="password" type="password" placeholder="Contraseña" required>
        </label>

        <button type="submit">Ingresar al sistema</button>
      </form>
    </div>
  </section>

  <footer class="page-brand">
    <span class="brand-label">Desarrollado por</span>
    <strong>Daniel Mendoza</strong>
  </footer>
</div>
