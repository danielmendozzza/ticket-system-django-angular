<div class="login-shell" [class.login-exit]="entrando">
  <section class="login-panel">
    <div class="login-brandmark" aria-hidden="true">
      <span>Tick</span>
      <strong>Sys</strong>
    </div>

    <div class="login-card">
      <p class="login-eyebrow">Centro operativo</p>
      <h1>Tick-Sys</h1>
      <p>Ingresa con tu usuario asignado para acceder al panel correspondiente.</p>

      <form class="login-form" (ngSubmit)="login()">
        <label>
          Usuario
          <input [(ngModel)]="username" name="username" placeholder="Usuario" required>
        </label>

        <label>
          Contraseña
          <input [(ngModel)]="password" name="password" type="password" placeholder="Contraseña" required>
        </label>

        @if (error) {
          <p class="login-error">{{ error }}</p>
        }

        <button type="submit" [disabled]="entrando">
          {{ entrando ? 'Abriendo Tick-Sys...' : 'Ingresar al sistema' }}
        </button>
      </form>
    </div>
  </section>

  <footer class="page-brand">
    <span class="brand-label">Desarrollado por</span>
    <strong>Daniel Mendoza</strong>
  </footer>
</div>
